name: DevSecOps Pipeline (Secure)

on:
  push:
    branches:
      - main

jobs:
  security-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Dependency Scan (Safety)
        run: |
          pip install safety
          safety check || true

      - name: Run Unit Tests
        run: |
          pip install pytest
          pytest

      - name: Build Docker Image
        run: |
          docker build -t secure-app .

      # ✅ FIXED: Use Trivy via Docker instead of broken GitHub Action
      - name: Container Scan (Trivy CLI)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy image secure-app

      - name: Deploy
        run: echo "Deployment successful"
